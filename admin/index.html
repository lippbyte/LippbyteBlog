<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lippbyte Admin — CMS Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Link relative to your blog's UI for accurate preview matching -->
  <link rel="stylesheet" href="../blog/template/css/style.css" id="previewCss" />
  <style>
    /* CMS UI Settings */
    :root {
      --cms-bg: #0d1117;
      --cms-surface: #161b22;
      --cms-border: #30363d;
      --cms-text: #e6edf3;
      --cms-text-dim: #8b949e;
      --cms-accent: #e8441a;
      --cms-accent-hover: #ff6b4a;
    }
    .light-mode {
      --cms-bg: #f6f8fa;
      --cms-surface: #ffffff;
      --cms-border: #d0d7de;
      --cms-text: #1F2328;
      --cms-text-dim: #656d76;
    }
    
    body { font-family: 'Inter', sans-serif; background: var(--cms-bg); color: var(--cms-text); margin: 0; display: flex; height: 100vh; overflow: hidden; font-size: 14px; }
    
    /* Toolbar, Sidebar, Panels */
    .app-container { display: flex; flex-direction: column; width: 100%; }
    .header { height: 55px; border-bottom: 1px solid var(--cms-border); background: var(--cms-surface); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
    .header-logo { font-weight: 700; color: var(--cms-text); text-decoration: none; display: flex; align-items: center; gap: 8px; font-size: 16px; }
    .header-logo span { background: var(--cms-accent); color: #fff; text-transform: uppercase; font-size: 10px; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px; }
    .header-info { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--cms-text-dim); }
    .header-info span.repo-badge { color: #3fb950; font-family: monospace; background: rgba(63, 185, 80, 0.1); padding: 3px 8px; border-radius: 12px; }
    
    .btn { background: var(--cms-surface); border: 1px solid var(--cms-border); color: var(--cms-text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: .15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: var(--cms-border); }
    .btn-primary { background: var(--cms-accent); color: #fff; border-color: var(--cms-accent); }
    .btn-primary:hover { background: var(--cms-accent-hover); border-color: var(--cms-accent-hover); }
    
    .main-body { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 260px; border-right: 1px solid var(--cms-border); background: var(--cms-surface); display: flex; flex-direction: column; }
    .sidebar-header { padding: 15px; border-bottom: 1px solid var(--cms-border); }
    .sidebar-title { font-size: 11px; text-transform: uppercase; color: var(--cms-text-dim); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 8px; }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; list-style: none; margin: 0; }
    .sb-item { display: flex; flex-direction: column; padding: 8px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; }
    .sb-item:hover { background: rgba(139, 148, 158, 0.1); }
    .sb-item.active { background: rgba(232, 68, 26, 0.1); border-left: 3px solid var(--cms-accent); }
    .sb-item-title { font-weight: 500; font-size: 13px; color: var(--cms-text); }
    .sb-item-meta { font-size: 11px; color: var(--cms-text-dim); margin-top: 4px; }
    
    .editor-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .toolbar { display: flex; gap: 8px; padding: 10px 15px; border-bottom: 1px solid var(--cms-border); background: var(--cms-surface); align-items: center; }
    .toolbar-btn { background: transparent; border: none; color: var(--cms-text-dim); cursor: pointer; padding: 4px 8px; border-radius: 4px; font-weight: 600; font-family: monospace; font-size: 13px; }
    .toolbar-btn:hover { background: var(--cms-border); color: var(--cms-text); }
    .toolbar-sep { width: 1px; height: 16px; background: var(--cms-border); margin: 0 4px; }
    
    .panes { flex: 1; display: flex; overflow: hidden; }
    .pane-write, .pane-preview { flex: 1; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
    .pane-write { border-right: 1px solid var(--cms-border); }
    .pane-write textarea { flex: 1; background: var(--cms-bg); color: var(--cms-text); border: none; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.6; resize: none; outline: none; overflow-y: auto; }
    .pane-preview { padding: 40px; background: var(--cms-bg); color: var(--cms-text); overflow-y: auto; }
    
    .meta-panel { width: 320px; border-left: 1px solid var(--cms-border); background: var(--cms-surface); display: flex; flex-direction: column; overflow-y: auto; }
    .meta-section { padding: 15px; border-bottom: 1px solid var(--cms-border); }
    .form-group { margin-bottom: 15px; }
    .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--cms-text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input, .form-textarea, .form-select { width: 100%; box-sizing: border-box; background: var(--cms-bg); border: 1px solid var(--cms-border); color: var(--cms-text); padding: 8px 10px; border-radius: 6px; font-size: 13px; font-family: inherit; }
    .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--cms-accent); box-shadow: 0 0 0 2px rgba(232, 68, 26, 0.2); }
    
    .dynamic-list { list-style: none; padding: 0; margin: 0; }
    .dynamic-list li { display: flex; gap: 6px; margin-bottom: 6px; }
    .dynamic-list li input { flex: 1; }
    .remove-btn { background: transparent; border: none; color: var(--cms-text-dim); cursor: pointer; font-size: 16px; }
    .remove-btn:hover { color: #f85149; }
    
    /* Login overlay */
    .overlay { position: fixed; inset: 0; background: var(--cms-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--cms-surface); padding: 30px; border-radius: 12px; border: 1px solid var(--cms-border); width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .login-card .header-logo { margin-bottom: 10px; justify-content: center; font-size: 20px; }
    
    /* Toast */
    #toast { position: fixed; bottom: 20px; right: 20px; background: #3fb950; color: white; padding: 12px 20px; border-radius: 6px; transform: translateY(100px); opacity: 0; transition: .3s; z-index: 10000; font-weight: 500; }
    #toast.show { transform: translateY(0); opacity: 1; }
    
    /* Real Preview Styles (Inherits partly from template css but scoped here if needed) */
    .preview-canvas { max-width: 820px; margin: 0 auto; }
    
  </style>
</head>
<body class="dark-mode">

  <!-- LOGIN/SETUP SCREEN -->
  <div class="overlay" id="setupOverlay">
    <div class="login-card">
      <div class="header-logo" style="margin-bottom: 20px;">
        Lippbyte <span>CMS</span>
      </div>
      <div class="form-group">
        <label class="form-label">GitHub Username</label>
        <input class="form-input" id="ghUser" type="text" placeholder="lippbyte" />
      </div>
      <div class="form-group">
        <label class="form-label">Repository</label>
        <input class="form-input" id="ghRepo" type="text" placeholder="LippbyteBlog" />
      </div>
      <div class="form-group">
        <label class="form-label">Branch</label>
        <input class="form-input" id="ghBranch" type="text" value="blogv2" />
      </div>
      <div class="form-group">
        <label class="form-label">Token (Fine-grained atau Classic `repo`)</label>
        <input class="form-input" id="ghToken" type="password" />
      </div>
      <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="saveConfig()">Simpan & Masuk</button>
    </div>
  </div>

  <div class="app-container">
    <!-- HEADER -->
    <header class="header">
      <a href="#" class="header-logo">
        DevLog <span>ADMIN</span>
      </a>
      <div class="header-info">
        <span class="repo-badge" id="headerRepoBadge">admin/LippbyteBlog</span>
        <button class="btn" onclick="toggleTheme()" title="Toggle Tema">🌓</button>
        <button class="btn btn-primary" onclick="publish()" id="publishBtn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
          Publish ke GitHub
        </button>
        <button class="btn" onclick="logout()">Keluar</button>
      </div>
    </header>

    <div class="main-body">
      <!-- SIDEBAR TOPIK & PARTS -->
      <aside class="sidebar">
        <div class="sidebar-header" style="display:flex; justify-content: space-between; align-items:center;">
          <span class="sidebar-title">Topik Blog</span>
          <button class="btn" style="padding: 2px 6px; font-size: 11px;" onclick="addTopic()">+ Topik</button>
        </div>
        <div style="padding: 10px;">
          <select class="form-select" id="topicSelect" onchange="loadSelectedTopic()"></select>
        </div>
        
        <div class="sidebar-header" style="display:flex; justify-content: space-between; align-items:center; border-top: 1px solid var(--cms-border);">
          <span class="sidebar-title">Parts</span>
          <button class="btn" style="padding: 2px 6px; font-size: 11px;" onclick="addPart()">+ Part</button>
        </div>
        <ul class="sidebar-list" id="partsList"></ul>
      </aside>

      <!-- EDITOR -->
      <main class="editor-container">
        <div class="toolbar">
          <button class="toolbar-btn" onclick="insertFmt('**', '**')">B</button>
          <button class="toolbar-btn" onclick="insertFmt('*', '*')">I</button>
          <button class="toolbar-btn" onclick="insertFmt('`', '`')">&lt;&gt;</button>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn" onclick="insertFmt('## ', '')">H2</button>
          <button class="toolbar-btn" onclick="insertFmt('### ', '')">H3</button>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn" onclick="insertFmt('- ', '')">• List</button>
          <button class="toolbar-btn" onclick="insertFmt('> **Catatan**\n> ', '')">💡 Info</button>
          <button class="toolbar-btn" onclick="insertFmt('```php\n', '\n```')">Code</button>
          <div style="flex:1"></div>
          <!-- View Toggles -->
          <button class="btn" onclick="setView('split')">Split</button>
          <button class="btn" onclick="setView('write')">Write</button>
          <button class="btn" onclick="setView('preview')">Preview</button>
        </div>
        
        <div class="panes">
          <div class="pane-write" id="paneWrite">
            <textarea id="mdEditor" spellcheck="false" placeholder="Tulis Markdown disini..."></textarea>
          </div>
          <div class="pane-preview" id="panePreview">
            <!-- Simulated layout container for preview -->
            <div class="preview-canvas part-section" id="previewContent"></div>
          </div>
        </div>
      </main>

      <!-- METADATA -->
      <aside class="meta-panel">
        <div class="meta-section">
          <div class="form-label" style="color:var(--cms-accent)">INFO DASAR</div>
          <div class="form-group"><label class="form-label">ID / SLUG PART</label><input class="form-input" id="partId" type="text" placeholder="pengenalan" readonly style="opacity:0.6"/></div>
          <div class="form-group"><label class="form-label">JUDUL PART</label><input class="form-input" id="partTitle" type="text" placeholder="Pendahuluan" /></div>
          <div class="form-group"><label class="form-label">LABEL NAVIGASI</label><input class="form-input" id="partLabel" type="text" placeholder="Part 1" /></div>
          <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1"><label class="form-label">TIPE</label><select class="form-select" id="partType"><option value="Teori">Teori</option><option value="Praktik">Praktik</option><option value="Project">Project</option></select></div>
            <div class="form-group" style="flex:1"><label class="form-label">TANGGAL</label><input class="form-input" id="partDate" type="date" /></div>
          </div>
          <div class="form-group"><label class="form-label">BACA (MENIT)</label><input class="form-input" id="partReadTime" type="number" value="10" /></div>
          <div class="form-group"><label class="form-label">INTRO SINOPSIS</label><textarea class="form-textarea" id="partIntro" rows="3" placeholder="Ringkasan bagian ini..."></textarea></div>
        </div>
        
        <div class="meta-section">
          <div class="form-label" style="color:var(--cms-accent)">TUJUAN PEMBELAJARAN</div>
          <ul class="dynamic-list" id="listObj"></ul>
          <button class="btn" style="margin-top:8px; font-size:11px;" onclick="addListItem('listObj')">+ Tambah Tujuan</button>
        </div>
        
        <div class="meta-section">
          <div class="form-label" style="color:var(--cms-accent)">REFLEKSI</div>
          <ul class="dynamic-list" id="listRefl"></ul>
          <button class="btn" style="margin-top:8px; font-size:11px;" onclick="addListItem('listRefl')">+ Tambah Refleksi</button>
        </div>
        
        <div class="meta-section">
          <div class="form-label" style="color:var(--cms-accent)">REFERENSI (Title | URL)</div>
          <ul class="dynamic-list" id="listRefs"></ul>
          <button class="btn" style="margin-top:8px; font-size:11px;" onclick="addRefRow()">+ Tambah Referensi</button>
        </div>
        
        <div class="meta-section">
          <div class="form-label" style="color:var(--cms-accent)">TAGS (Koma)</div>
          <input class="form-input" id="partTags" type="text" placeholder="Laravel, MVC, PHP" />
        </div>
      </aside>
    </div>
  </div>

  <div id="toast">Berhasil disimpan!</div>

  <script>
    // --- MARKED.JS OVERRIDES (Sesuai prompt.txt) ---
    const renderer = new marked.Renderer();
    renderer.strong = t => { let txt=typeof t==='string'?t:t.text; return `<strong class="font-semibold text-text-primary">${txt}</strong>`; };
    renderer.em = t => { let txt=typeof t==='string'?t:t.text; return `<em>${txt}</em>`; };
    renderer.image = (href, title, text) => {
      if(typeof href==='object') { text=href.text; title=href.title; href=href.href; }
      return `<figure class="my-8">
        <div class="img-image text-sm"><img src="${href}" alt="${text||''}" class="rounded-lg border border-border shadow-sm max-w-full"></div>
        <figcaption class="text-center text-xs text-text-faint mt-2 italic"><strong>Gambar</strong> — ${text||''}.</figcaption>
      </figure>`;
    };
    renderer.blockquote = q => {
      let qStr = typeof q === 'object' ? (q.text || q.raw || '') : q;
      let text = String(qStr).replace(/<[^>]*>?/gm, '').trim(); // strip html
      if(/(catatan|note|info|fun fact)/i.test(text.substring(0,25))) {
        return `<div class="callout callout-note"><span class="callout-icon text-base shrink-0 leading-7">💡</span><div class="callout-body flex-1"><p class="callout-title text-[.73rem] font-bold tracking-wider uppercase mb-1">Catatan</p><div class="text-sm leading-relaxed">${qStr}</div></div></div>`;
      }
      if(/(peringatan|warning|perhatian)/i.test(text.substring(0,25))) {
        return `<div class="callout callout-warn"><span class="callout-icon text-base shrink-0 leading-7">⚠️</span><div class="callout-body flex-1"><p class="callout-title text-[.73rem] font-bold tracking-wider uppercase mb-1">Perhatian</p><div class="text-sm leading-relaxed">${qStr}</div></div></div>`;
      }
      if(/(tips|best practice|✅)/i.test(text.substring(0,25))) {
        return `<div class="callout callout-tip"><span class="callout-icon text-base shrink-0 leading-7">✅</span><div class="callout-body flex-1"><p class="callout-title text-[.73rem] font-bold tracking-wider uppercase mb-1">Tips</p><div class="text-sm leading-relaxed">${qStr}</div></div></div>`;
      }
      return `<blockquote class="border-l-4 border-accent pl-4 my-4 italic text-text-muted bg-accent-soft p-3 rounded-r-lg">${qStr}</blockquote>`;
    };
    renderer.heading = (text, level) => {
      if(typeof text==='object') { level=text.depth; text=text.text; }
      if(level===1) return ''; // Title mapped elsewhere
      if(level===2) return `<h2 class="font-serif text-xl font-semibold text-text-primary tracking-tight mt-[2.75em] mb-[.6em] pb-2.5 border-b-2 border-border">${text}</h2>`;
      if(level===3) return `<h3 class="font-serif text-lg font-semibold text-text-primary tracking-tight mt-[2em] mb-[.5em]">${text}</h3>`;
      return `<h${level}>${text}</h${level}>`;
    };
    renderer.list = (body, ordered) => {
      if(typeof body==='object') { ordered=body.ordered; body=body.text || body.items?.map(i=>renderer.listitem(i)).join('') || ''; }
      return `<ul class="pl-6">${body}</ul>`;
    };
    renderer.listitem = text => {
      let txt=typeof text==='string'?text:text.text;
      return `<li class="my-[.3em]"><strong class="font-semibold text-text-primary">${txt}</strong></li>`;
    };
    renderer.code = (code, language) => {
      if(typeof code==='object') { language=code.lang; code=code.text; }
      let title = language || 'terminal'; let t = title.split(':'); if(t.length>1){ title=t[1]; }
      return `<div class="code-block"><div class="code-titlebar"><div class="traffic-lights flex items-center gap-1.5"><span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span></div><span class="code-filename font-mono text-xs text-zinc-500">${title}</span></div><pre><code>${escHtml(code)}</code></pre></div>`;
    };
    marked.use({ renderer });

    // --- STATE ---
    let config = {};
    let topics = [];
    let currentTopicId = '';
    let partsData = { parts: [] };
    let currentPartIndex = 0;

    // --- INIT ---
    window.onload = () => {
      let saved = localStorage.getItem('lipp_cms');
      let theme = localStorage.getItem('lipp_theme') || 'dark-mode';
      document.body.className = theme;
      
      if(saved) {
        config = JSON.parse(saved);
        document.getElementById('setupOverlay').style.display = 'none';
        document.getElementById('headerRepoBadge').innerText = `${config.username}/${config.repo} (${config.branch})`;
        initData();
      }
    };
    
    function toggleTheme() {
      let isDark = document.body.className === 'dark-mode';
      document.body.className = isDark ? 'light-mode' : 'dark-mode';
      localStorage.setItem('lipp_theme', document.body.className);
    }

    function saveConfig() {
      config = {
        username: document.getElementById('ghUser').value.trim(),
        repo: document.getElementById('ghRepo').value.trim(),
        branch: document.getElementById('ghBranch').value.trim(),
        token: document.getElementById('ghToken').value.trim()
      };
      if(!config.username || !config.repo || !config.token) return alert('Lengkapi data GitHub!');
      localStorage.setItem('lipp_cms', JSON.stringify(config));
      document.getElementById('setupOverlay').style.display = 'none';
      document.getElementById('headerRepoBadge').innerText = `${config.username}/${config.repo} (${config.branch})`;
      initData();
    }

    function logout() { localStorage.removeItem('lipp_cms'); location.reload(); }
    function showToast(msg) { let t = document.getElementById('toast'); t.innerText=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
    function escHtml(s) { let d=document.createElement('div'); d.innerText=s; return d.innerHTML; }

    // --- GITHUB API HELPER ---
    async function ghReq(path, method='GET', bodyContent=null) {
      let url = `https://api.github.com/repos/${config.username}/${config.repo}/contents/${path}`;
      if(method==='GET') url += `?ref=${config.branch}`;
      let opts = {
        method,
        headers: {
          'Authorization': `Bearer ${config.token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        }
      };
      if(bodyContent) {
        let sha = null;
        try { let ex = await fetch(url + (method!=='GET'? `?ref=${config.branch}`:''), {headers:opts.headers}); if(ex.ok) { let exj = await ex.json(); sha = exj.sha; } } catch(e){}
        opts.body = JSON.stringify({ message: `CMS Update ${path}`, content: btoa(unescape(encodeURIComponent(bodyContent))), branch: config.branch, ...(sha?{sha}:{}) });
      }
      let res = await fetch(url, opts);
      if(!res.ok) throw new Error(res.status);
      return await res.json();
    }

    // --- LOGIC ---
    async function initData() {
      try {
        let res = await ghReq('data/topics.json');
        topics = JSON.parse(atob(res.content));
        let sel = document.getElementById('topicSelect');
        sel.innerHTML = topics.map(t => `<option value="${t.id}">${t.title}</option>`).join('');
        if(topics.length > 0) { 
          if(!currentTopicId || !topics.find(t=>t.id===currentTopicId)) {
            currentTopicId = topics[0].id; 
          }
          sel.value = currentTopicId;
          await loadTopicData(); 
        }
      } catch(e) {
        console.error(e); showToast('Gagal muat topics.json. Cek Token/Repo.');
      }
    }

    async function loadTopicData() {
      try {
        let res = await ghReq(`data/${currentTopicId}/parts.json`);
        partsData = JSON.parse(atob(res.content));
        currentPartIndex = 0;
        renderPartsList();
        loadPart();
      } catch(e) { console.error('parts.json missing', e); partsData = { parts:[] }; renderPartsList(); }
    }

    function loadSelectedTopic() { currentTopicId = document.getElementById('topicSelect').value; loadTopicData(); }

    async function addTopic() {
      let title = prompt('Nama Topik Baru? (ex: Belajar Python)');
      if(!title) return;
      let id = title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      // Add to topics.json
      topics.push({ id, title, category: 'Baru', description: '', emoji: '🚀', status: 'active' });
      await ghReq('data/topics.json', 'PUT', JSON.stringify(topics, null, 2));
      
      // Create empty parts.json
      let defaultParts = { topic: id, title, updatedAt: new Date().toISOString(), parts: [] };
      await ghReq(`data/${id}/parts.json`, 'PUT', JSON.stringify(defaultParts, null, 2));
      await ghReq(`data/${id}/meta.json`, 'PUT', JSON.stringify({id, title}, null, 2));
      
      currentTopicId = id; // Set the newly created topic as the active one
      showToast('Topik dibuat! Silakan tambah Part.');
      initData();
    }

    function renderPartsList() {
      let html = '';
      partsData.parts.forEach((p, i) => {
        html += `<li class="sb-item ${i===currentPartIndex?'active':''}" onclick="saveCurrent(); currentPartIndex=${i}; loadPart();">
          <div class="sb-item-title">${p.title || 'Untitled'}</div>
          <div class="sb-item-meta">${p.label || ('Part '+p.partNumber)}</div>
        </li>`;
      });
      document.getElementById('partsList').innerHTML = html;
    }

    function addPart() {
      saveCurrent();
      let n = partsData.parts.length;
      partsData.parts.push({
        id: n===0?'pendahuluan':`part-${n}`,
        partNumber: n, title: 'Judul Baru', label: n===0?'Pendahuluan':`Part ${n}`,
        type: 'Teori', date: new Date().toISOString().split('T')[0], readTime: 10,
        content: '', objectives: [], reflection: [], references: [], tags: []
      });
      currentPartIndex = n;
      renderPartsList();
      loadPart();
    }

    // --- LOAD & SAVE EDITOR ---
    function loadPart() {
      if(!partsData.parts[currentPartIndex]) { document.getElementById('mdEditor').value=''; return; }
      renderPartsList();
      let p = partsData.parts[currentPartIndex];
      document.getElementById('partId').value = p.id || '';
      document.getElementById('partTitle').value = p.title || '';
      document.getElementById('partLabel').value = p.label || '';
      document.getElementById('partType').value = p.type || 'Teori';
      document.getElementById('partDate').value = p.date || '';
      document.getElementById('partReadTime').value = p.readTime || 10;
      document.getElementById('partIntro').value = p.intro || '';
      document.getElementById('partTags').value = (p.tags||[]).join(', ');
      
      document.getElementById('mdEditor').value = p.content || '';
      
      let listHTML = (arr) => (arr||[]).map(v => `<li><input class="form-input" value="${escHtml(v||'')}" oninput="updatePreview()"><button class="remove-btn" onclick="this.parentElement.remove(); updatePreview()">×</button></li>`).join('');
      document.getElementById('listObj').innerHTML = listHTML(p.objectives);
      document.getElementById('listRefl').innerHTML = listHTML(p.reflection);
      
      document.getElementById('listRefs').innerHTML = (p.references||[]).map(r => `<li style="flex-direction:column; gap:4px; padding:6px; background:var(--cms-bg); border:1px solid var(--cms-border); border-radius:4px;"><input class="form-input" placeholder="Teks" value="${escHtml(r.text||'')}" oninput="updatePreview()"><input class="form-input" placeholder="URL" value="${escHtml(r.url||'')}" oninput="updatePreview()"><button class="btn btn-primary" style="background:#f85149; border:none; width:max-content" onclick="this.parentElement.remove(); updatePreview()">Hapus</button></li>`).join('');
      
      updatePreview();
    }
    
    function addListItem(id) { 
      document.getElementById(id).insertAdjacentHTML('beforeend', `<li><input class="form-input" oninput="updatePreview()"><button class="remove-btn" onclick="this.parentElement.remove(); updatePreview()">×</button></li>`); 
      updatePreview();
    }
    function addRefRow() { 
      document.getElementById('listRefs').insertAdjacentHTML('beforeend', `<li style="flex-direction:column; gap:4px; padding:6px; background:var(--cms-bg); border:1px solid var(--cms-border); border-radius:4px;"><input class="form-input" placeholder="Teks" oninput="updatePreview()"><input class="form-input" placeholder="URL" oninput="updatePreview()"><button class="btn btn-primary" style="background:#f85149; border:none; width:max-content" onclick="this.parentElement.remove(); updatePreview()">Hapus</button></li>`); 
      updatePreview();
    }
    function getList(id) { return Array.from(document.getElementById(id).querySelectorAll('input')).map(i=>i.value).filter(v=>v.trim()); }
    function getRefs() { return Array.from(document.getElementById('listRefs').children).map((li,i) => { let inps=li.querySelectorAll('input'); return {num:String(i+1), text:inps[0].value, url:inps[1].value}; }).filter(r=>r.text); }

    function saveCurrent() {
      if(!partsData.parts[currentPartIndex]) return;
      let p = {
        id: document.getElementById('partId').value || `part-${currentPartIndex}`,
        partNumber: currentPartIndex,
        title: document.getElementById('partTitle').value,
        label: document.getElementById('partLabel').value,
        type: document.getElementById('partType').value,
        date: document.getElementById('partDate').value,
        readTime: document.getElementById('partReadTime').value,
        intro: document.getElementById('partIntro').value,
        tags: document.getElementById('partTags').value.split(',').map(s=>s.trim()).filter(Boolean),
        objectives: getList('listObj'),
        reflection: getList('listRefl'),
        references: getRefs(),
        content: document.getElementById('mdEditor').value
      };
      partsData.parts[currentPartIndex] = p;
    }

    // --- PREVIEW RENDER ---
    function updatePreview() {
      saveCurrent();
      let p = partsData.parts[currentPartIndex];
      if(!p) return;
      
      let html = `<div class="part-header mb-9">
          <p class="part-label inline-flex items-center gap-2 text-[.72rem] font-bold tracking-[.1em] uppercase text-accent mb-3.5"><span class="part-label-line w-5 h-0.5 bg-accent"></span> ${p.label||''}</p>
          <h1 class="part-title font-serif text-[clamp(1.6rem,3.5vw,2.15rem)] font-semibold leading-snug text-text-primary tracking-tight mb-5">${p.title||'Untitled'}</h1>
          <div class="part-meta flex flex-wrap items-center gap-x-4 gap-y-1.5 text-sm text-text-muted">
            <span>📅 ${p.date||'-'}</span><span class="w-1 h-1 rounded-full bg-border-strong"></span><span>⏱ ~${p.readTime} menit baca</span><span class="w-1 h-1 rounded-full bg-border-strong"></span><span>🏷 ${p.type}</span>
          </div>
          ${p.intro ? `<div class="part-intro mt-5 p-4 bg-surface border border-border rounded-[10px] text-[.95rem] leading-7 text-text-muted italic border-l-[3px] border-l-accent">${p.intro}</div>` : ''}
        </div>`;
      
      let objHtml = '';
      if(p.objectives.length>0) {
        objHtml = `<div class="objectives-box"><div class="objectives-header text-[.72rem] font-bold tracking-[.1em] uppercase text-text-muted">🎯 Tujuan Pembelajaran</div><div class="objectives-body p-4"><ul class="pl-5">${p.objectives.map(o=>`<li class="text-sm text-text-body py-0.5">${o}</li>`).join('')}</ul></div></div>`;
      }
      
      html += `<div class="content-body" style="font-size:16px; line-height:1.8; color:var(--text-body);">${objHtml}${marked.parse(p.content||'')}</div>`;
      
      document.getElementById('previewContent').innerHTML = html;
    }

    document.getElementById('mdEditor').addEventListener('input', updatePreview);
    document.querySelectorAll('.meta-panel input, .meta-panel textarea').forEach(el => el.addEventListener('input', updatePreview));

    function setView(mode) {
      const w = document.getElementById('paneWrite');
      const p = document.getElementById('panePreview');
      if(mode==='split'){ w.style.display='flex'; p.style.display='flex'; w.style.flex='1'; }
      if(mode==='write'){ w.style.display='flex'; p.style.display='none'; w.style.flex='1'; }
      if(mode==='preview'){ w.style.display='none'; p.style.display='flex'; }
    }

    function insertFmt(before, after) {
      let r = document.getElementById('mdEditor');
      let start = r.selectionStart, end = r.selectionEnd;
      let text = r.value;
      r.value = text.substring(0, start) + before + text.substring(start, end) + after + text.substring(end);
      r.focus(); r.selectionEnd = end + before.length;
      updatePreview();
    }

    // --- PUBLISH: SSG LOGIC ---
    async function publish() {
      saveCurrent();
      let btn = document.getElementById('publishBtn'); btn.innerHTML = 'Memproses...'; btn.disabled=true;
      try {
        // 1. Update parts.json
        partsData.updatedAt = new Date().toISOString();
        await ghReq(`data/${currentTopicId}/parts.json`, 'PUT', JSON.stringify(partsData, null, 2));
        
        // 2. Fetch HTML Template
        let tplRes = await ghReq('blog/template/index.html');
        let htmlStr = decodeURIComponent(escape(atob(tplRes.content)));
        
        let tp = topics.find(t=>t.id===currentTopicId);
        htmlStr = htmlStr.replace(/<title>.*?<\/title>/, `<title>Lippbyte — ${tp.title}</title>`);
        htmlStr = htmlStr.replace(/\[JUDUL TOPIK\]/g, tp.title);
        
        // 3. Generate Sidebar
        let sbHtml = partsData.parts.map(p => `<li><a href="#${p.id}" class="nav-link flex items-center gap-2.5 py-2 px-5 text-sm font-medium text-text-muted border-l-2 border-transparent"><span class="part-num inline-flex items-center justify-center w-5 h-5 text-[.7rem] font-bold bg-surface-2 rounded text-text-faint shrink-0">${p.partNumber}</span><span class="nav-text flex-1">${escHtml(p.label)}</span><span class="nav-progress-ring"><svg width="18" height="18" viewBox="0 0 36 36"><circle cx="18" cy="18" r="15.5" fill="none" stroke="var(--border)" stroke-width="2.5"/><circle class="progress-circle" cx="18" cy="18" r="15.5" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-dasharray="97.4" stroke-dashoffset="97.4" stroke-linecap="round" transform="rotate(-90 18 18)"/></svg></span></a></li>`).join('\n');
        
        // 4. Generate Content
        let contentHtml = '';
        partsData.parts.forEach((p, idx) => {
          let prev = partsData.parts[idx-1]; let next = partsData.parts[idx+1];
          let objHtml = p.objectives.length? `<div class="objectives-box"><div class="objectives-header text-[.72rem] font-bold tracking-[.1em] uppercase text-text-muted">🎯 Tujuan Pembelajaran</div><div class="objectives-body p-4"><ul class="pl-5">${p.objectives.map(o=>`<li class="text-sm text-text-body py-0.5">${escHtml(o)}</li>`).join('')}</ul></div></div>` : '';
          let refHtml = p.reflection.length? `<div class="reflection-box"><p class="reflection-header flex items-center gap-2.5 text-[.72rem] font-bold tracking-[.1em] uppercase text-accent mb-3.5">Refleksi</p><p class="text-sm text-text-body leading-7 mb-3">Renungkan materi ini:</p><ul class="reflection-questions list-none p-0">${p.reflection.map(r=>`<li class="text-sm text-text-muted">${escHtml(r)}</li>`).join('')}</ul></div>` : '';
          let refsLst = p.references.length? `<div class="references-box"><div class="references-header text-[.72rem] font-bold tracking-[.1em] uppercase text-text-muted">📚 Referensi</div><ul class="references-list list-none p-0 m-0">${p.references.map(r=>`<li class="p-3 flex items-start gap-2.5 text-sm"><span class="ref-num text-[.72rem] font-bold shrink-0 mt-0.5">${escHtml(r.num)}</span><span class="ref-text text-text-muted leading-relaxed">${r.url?`<a href="${r.url}" target="_blank" class="text-accent font-medium">${escHtml(r.text)}</a>`:escHtml(r.text)}</span></li>`).join('')}</ul></div>` : '';
          let tagsHtml = p.tags.length? `<div class="tag-row flex flex-wrap gap-1.5 mt-7">${p.tags.map(t=>`<span class="tag text-[.73rem] font-medium px-2.5 py-0.5">${escHtml(t)}</span>`).join('')}</div>` : '';
          
          let navHtml = `<div class="part-footer-nav flex justify-between items-center gap-4 mt-10 pt-6 border-t border-border">`;
          if(prev) navHtml += `<a href="#${prev.id}" class="part-nav-btn flex items-center gap-2 py-2.5 px-4 text-sm font-medium text-text-muted no-underline"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>${escHtml(prev.label)}</a>`; else navHtml += `<span></span>`;
          if(next) navHtml += `<a href="#${next.id}" class="part-nav-btn flex items-center flex-row-reverse gap-2 py-2.5 px-4 text-sm font-medium text-text-muted no-underline">${escHtml(next.label)}<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>`;
          else navHtml += `<a href="../../home/index.html" class="part-nav-btn flex items-center flex-row-reverse gap-2 py-2.5 px-4 text-sm font-medium text-text-muted no-underline bg-accent-soft border-accent-mid">🏠 Kembali ke Beranda</a>`;
          navHtml += `</div>`;

          contentHtml += `
          <section class="part-section pt-16 pb-8 ${next?'border-b border-border':''}" id="${p.id}">
            <div class="part-header mb-9">
              <p class="part-label inline-flex items-center gap-2 text-[.72rem] font-bold tracking-[.1em] uppercase text-accent mb-3.5"><span class="part-label-line w-5 h-0.5 bg-accent"></span> ${escHtml(p.label)}</p>
              <h1 class="part-title font-serif text-[clamp(1.6rem,3.5vw,2.15rem)] font-semibold leading-snug text-text-primary tracking-tight mb-5">${escHtml(p.title)}</h1>
              <div class="part-meta flex flex-wrap items-center gap-x-4 gap-y-1.5 text-sm text-text-muted">
                <span>📅 ${p.date||''}</span><span class="w-1 h-1 rounded-full bg-border-strong"></span><span>⏱ ~${p.readTime||10} menit baca</span><span class="w-1 h-1 rounded-full bg-border-strong"></span><span>🏷 ${escHtml(p.type)}</span>
              </div>
              ${p.intro? `<div class="part-intro mt-5 p-4 bg-surface border border-border rounded-[10px] text-[.95rem] leading-7 text-text-muted italic border-l-[3px] border-l-accent">${escHtml(p.intro)}</div>` : ''}
            </div>
            <div class="content-body">${objHtml}${marked.parse(p.content||'')}</div>
            ${refHtml}${refsLst}${tagsHtml}${navHtml}
          </section>`;
        });
        
        htmlStr = htmlStr.replace('<!-- [INJECT_SIDEBAR] -->', sbHtml);
        htmlStr = htmlStr.replace('<!-- [INJECT_CONTENT] -->', contentHtml);
        
        // 5. Fix link relative path for css (if it was pointing to template folders)
        // Since the generator assumes `blog/[topicID]/index.html`, `css/style.css` should resolve to `../template/css/style.css` 
        // to avoid duplicating files! Let's inject `../template/` into resource links if they are relative.
        htmlStr = htmlStr.replace(/href="css\//g, 'href="../template/css/');
        htmlStr = htmlStr.replace(/src="js\//g, 'src="../template/js/');
        
        // 6. Upload Final HTML
        await ghReq(`blog/${currentTopicId}/index.html`, 'PUT', htmlStr);
        showToast('Sukses! File statis HTML berhasil digenerate di GitHub.');
        
      } catch(e) { console.error(e); alert('Error Publish: ' + e.message); }
      btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg> Publish ke GitHub`;
      btn.disabled=false;
    }
  </script>
</body>
</html>
